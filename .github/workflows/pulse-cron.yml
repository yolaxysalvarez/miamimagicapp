name: Miami Pulse — hourly trigger

on:
  schedule:
    - cron: '0 * * * *'   # cada hora, en punto
  workflow_dispatch:        # también permite dispararlo manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar a /api/send-pulse
        run: |
          curl -sS -X POST "https://www.miamimagicapp.com/api/send-pulse" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n"
